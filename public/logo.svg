<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .leaf { fill: #16a34a; }
      .fork { fill: #15803d; }
    </style>
  </defs>
  
  <!-- Fork handle -->
  <rect x="85" y="120" width="30" height="70" rx="15" class="fork"/>
  
  <!-- Fork prongs -->
  <rect x="70" y="50" width="8" height="70" rx="4" class="fork"/>
  <rect x="96" y="40" width="8" height="80" rx="4" class="fork"/>
  <rect x="122" y="50" width="8" height="70" rx="4" class="fork"/>
  
  <!-- Connection -->
  <circle cx="100" cy="120" r="12" class="fork"/>
  
  <!-- Left leaf 1 -->
  <ellipse cx="60" cy="80" rx="16" ry="24" class="leaf" transform="rotate(-35 60 80)"/>
  
  <!-- Left leaf 2 -->
  <ellipse cx="50" cy="110" rx="14" ry="20" class="leaf" transform="rotate(-15 50 110)"/>
  
  <!-- Right leaf 1 -->
  <ellipse cx="140" cy="80" rx="16" ry="24" class="leaf" transform="rotate(35 140 80)"/>
  
  <!-- Right leaf 2 -->
  <ellipse cx="150" cy="110" rx="14" ry="20" class="leaf" transform="rotate(15 150 110)"/>
  
  <!-- Center vine leaf -->
  <ellipse cx="100" cy="35" rx="12" ry="18" class="leaf" transform="rotate(0 100 35)"/>
</svg>
