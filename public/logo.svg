<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Circle border -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#2d7e4a" stroke-width="8"/>
  
  <!-- Fork handle -->
  <rect x="185" y="280" width="30" height="80" fill="#2d7e4a" rx="15"/>
  
  <!-- Fork prongs -->
  <line x1="165" y1="280" x2="155" y1="180" stroke="#2d7e4a" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="280" x2="200" y2="160" stroke="#2d7e4a" stroke-width="8" stroke-linecap="round"/>
  <line x1="235" y1="280" x2="245" y2="180" stroke="#2d7e4a" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Connection point -->
  <circle cx="200" cy="280" r="18" fill="#2d7e4a"/>
  
  <!-- Left leaf 1 -->
  <ellipse cx="140" cy="200" rx="25" ry="35" fill="#2d7e4a" opacity="0.8" transform="rotate(-45 140 200)"/>
  
  <!-- Left leaf 2 -->
  <ellipse cx="130" cy="240" rx="22" ry="30" fill="#2d7e4a" opacity="0.9" transform="rotate(-20 130 240)"/>
  
  <!-- Right leaf 1 -->
  <ellipse cx="260" cy="200" rx="25" ry="35" fill="#2d7e4a" opacity="0.8" transform="rotate(45 260 200)"/>
  
  <!-- Right leaf 2 -->
  <ellipse cx="270" cy="240" rx="22" ry="30" fill="#2d7e4a" opacity="0.9" transform="rotate(20 270 240)"/>
  
  <!-- Vine curve -->
  <path d="M 200 160 Q 180 140 160 130" stroke="#2d7e4a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 200 160 Q 220 140 240 130" stroke="#2d7e4a" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Top leaves on vine -->
  <ellipse cx="145" cy="115" rx="18" ry="25" fill="#2d7e4a" opacity="0.7" transform="rotate(-50 145 115)"/>
  <ellipse cx="255" cy="115" rx="18" ry="25" fill="#2d7e4a" opacity="0.7" transform="rotate(50 255 115)"/>
  
  <!-- Top text -->
  <text x="200" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#2d7e4a" letter-spacing="8">
    SALADGO
  </text>
  
  <!-- Bottom text -->
  <text x="200" y="360" font-family="Arial, sans-serif" font-size="24" text-anchor="middle" fill="#2d7e4a" letter-spacing="3">
    Go Green Today
  </text>
</svg>
